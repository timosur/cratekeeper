services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: djlib
      POSTGRES_USER: dj
      POSTGRES_PASSWORD: dj
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dj -d djlib"]
      interval: 2s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8765:8765"
    volumes:
      - ./data:/app/data
      - ~/.cratekeeper:/root/.cratekeeper
      - /Volumes/home/Music:/music:ro
      - ~/Music/Library:/library
    environment:
      - CRATEKEEPER_DB_URL=postgresql+psycopg://dj:dj@db:5432/djlib
      - CRATEKEEPER_FERNET_KEY=${CRATEKEEPER_FERNET_KEY:-}
      - CRATEKEEPER_API_TOKEN=${CRATEKEEPER_API_TOKEN:-}
      - CRATEKEEPER_CORS_ORIGINS=http://localhost,http://localhost:5173

volumes:
  pgdata:
